[build]
  builder = "nixpacks"
  buildCommand = "npm run build:web && npx prisma generate --schema=apps/api/prisma/schema.prisma && npm run build:api"

[deploy]
  startCommand = "npx prisma db push --schema=apps/api/prisma/schema.prisma --accept-data-loss && cd apps/api && npx tsx prisma/seed.ts; cd ../.. && node apps/api/dist/index.js"
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 3
